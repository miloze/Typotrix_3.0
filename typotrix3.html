<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typotrix 3</title>
  <style>
    /* ═══════════════════════════════════════════════════════════
       Design tokens — change these to restyle everything
       ═══════════════════════════════════════════════════════════ */
    :root {
      --bg:       #000000;
      --fg:       #ffffff;
      --label-fg: #666666;
      --grid-gap: 0px;
      --label-h:  28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      transition: background 0.35s ease;
    }

    /* ── App container — panels stack absolutely, each slides independently ── */
    #app-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* Clock is always the inverse of Typotrix */
    #app-clock {
      background: var(--bg);
      filter: invert(1);
    }



    /* ── Shared grid layout ──────────────────────────────────── */
    .letter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: var(--grid-gap);
      width: 100vw;
      height: calc(100vh - var(--label-h));
    }

    .letter-grid.single-mode {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .letter-grid.single-mode .cell:not(:first-child) {
      display: none;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .letter {
      display: block;
      color: var(--fg);
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.25s ease, color 0.35s ease;
      user-select: none;
      transform-origin: center center;
      will-change: font-variation-settings;
    }

    .letter.visible {
      opacity: 1;
    }

    /* ── Shared label bar ────────────────────────────────────── */
    .app-label {
      height: var(--label-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--label-fg);
      transition: color 0.35s ease;
      user-select: none;
    }

    /* ── Hidden measure element ──────────────────────────────── */
    #measure {
      position: absolute;
      top: -9999px;
      left: -9999px;
      visibility: hidden;
      white-space: nowrap;
      line-height: 1;
    }
  </style>
</head>
<body>

<div id="app-container">

  <!-- ── App 0: Typotrix ───────────────────────────────────── -->
  <div id="app-typotrix" class="app">
    <div id="grid" class="letter-grid">
      <div class="cell"><span class="letter" id="l0"></span></div>
      <div class="cell"><span class="letter" id="l1"></span></div>
      <div class="cell"><span class="letter" id="l2"></span></div>
      <div class="cell"><span class="letter" id="l3"></span></div>
    </div>
    <div id="label" class="app-label">loading…</div>
  </div>

  <!-- ── App 1: Clock ──────────────────────────────────────── -->
  <div id="app-clock" class="app">
    <div id="clock-grid" class="letter-grid">
      <div class="cell"><span class="letter" id="c0"></span></div>
      <div class="cell"><span class="letter" id="c1"></span></div>
      <div class="cell"><span class="letter" id="c2"></span></div>
      <div class="cell"><span class="letter" id="c3"></span></div>
    </div>
    <div id="clock-label" class="app-label">--:--:--</div>
  </div>


</div>

<span id="measure"></span>

<script>
'use strict';

// ╔══════════════════════════════════════════════════════════════╗
// ║  CONFIG — everything you'd want to experiment with           ║
// ╚══════════════════════════════════════════════════════════════╝
const CONFIG = {

  screen: { w: 720, h: 720 },
  grid:   { cols: 2, rows: 2, labelHeight: 28 },

  // How much of each cell the letter fills (0–1)
  fontScale: 0.88,

  // ── Animation ────────────────────────────────────────────────
  anim: {
    wdthPeriod:    4.0,           // seconds per full width cycle
    wdthPhase:     0,
    wghtPeriod:    7.0,           // seconds per full weight cycle
    wghtPhase:     Math.PI * 0.6, // offset so wdth & wght peak at different times

    // Per-letter phase offset in radians.
    // 0 = all letters move together. Try 0.4 for independent drift.
    letterStagger: 0.9,

    revealDelay: 0.07,            // seconds between each letter appearing
  },

  // ── Colours ──────────────────────────────────────────────────
  colors: {
    bg:       '#000000',
    fg:       '#ffffff',
    labelFg:  '#333333',
    bgInv:    '#ffffff',
    fgInv:    '#000000',
    labelInv: '#999999',
  },

  // ── Location (for weather) ───────────────────────────────────
  location: {
    lat:  51.5,     // London — change to your lat/lon
    lon:  -0.1,
    name: 'London',
  },

  // ── Touch ────────────────────────────────────────────────────
  touch: {
    swipeThreshold: 60,   // px of travel to count as a swipe (vs tap)
    longPressMs:    500,  // ms hold to trigger long-press action
  },

  // ── Words ────────────────────────────────────────────────────
  words: [
    "TYPE","KERN","GRID","FLUX","BOLD","INK","LEAD","FONT","FORM","MARK",
    "AXIS","BEAM","CROP","DASH","EDGE","FACE","GRIT","HEFT","JOIN","KNOT",
    "LIFT","MESH","NODE","OPEN","PATH","QUAD","RULE","SLAB","THIN","UNIT",
    "VOID","WAVE","ZERO","APEX","BARE","EMIT","FINE","GRIP","HARD","IRON",
    "JUST","KEEN","LOOP","MAST","NEON","OVAL","PEAK","RIFT","SCAN","TILT",
    "URGE","VANE","WARP","ZONE","ARCH","BLOC","CORD","DUCT","EXPO","FOLD",
    "GLOW","HALO","IDEA","JOLT","LACE","MINT","NULL","ORBS","RING","SLOT",
    "TRIM","VENT","WIRE","ZOOM","ALTO","BASS","CLEF","DEEP","ECHO","FLAT",
    "GLUE","HOOK","OPUS","DRAW","BURN","CAST","CUTS","DEFT","DOTS","FUSE",
    "GASH","LOOM","MASK","MOLD","NUMB","PEEL","POUR","PULL","PUSH","SEAM",
  ],

  // ── Fonts ────────────────────────────────────────────────────
  // localFile: filename in /home/milo/fonts/ (downloaded by setup_fonts.sh)
  // wdth: [min, max] — null if no width axis
  // wght: [min, max] — required
  fonts: [
    { name: "Roboto Flex",       localFile: "Roboto_Flex_variable.ttf",       wdth: [25,  151], wght: [100, 1000] },
    { name: "Encode Sans",       localFile: "Encode_Sans_variable.ttf",       wdth: [75,  125], wght: [100,  900] },
    { name: "Anybody",           localFile: "Anybody_variable.ttf",           wdth: [50,  150], wght: [100,  900] },
    { name: "Crimson Pro",       localFile: "Crimson_Pro_variable.ttf",       wdth: null,       wght: [200,  900] },
    { name: "Raleway",           localFile: "Raleway_variable.ttf",           wdth: null,       wght: [100,  900] },
    { name: "Nunito",            localFile: "Nunito_variable.ttf",            wdth: null,       wght: [200, 1000] },
    { name: "Manrope",           localFile: "Manrope_variable.ttf",           wdth: null,       wght: [200,  800] },
    { name: "DM Sans",           localFile: "DM_Sans_variable.ttf",           wdth: null,       wght: [100,  900] },
    { name: "Inter",             localFile: "Inter_variable.ttf",             wdth: null,       wght: [100,  900] },
    { name: "Jost",              localFile: "Jost_variable.ttf",              wdth: null,       wght: [100,  900] },
    { name: "Syne",              localFile: "Syne_variable.ttf",              wdth: null,       wght: [400,  800] },
    { name: "Outfit",            localFile: "Outfit_variable.ttf",            wdth: null,       wght: [100,  900] },
    { name: "Urbanist",          localFile: "Urbanist_variable.ttf",          wdth: null,       wght: [100,  900] },
    { name: "Plus Jakarta Sans", localFile: "Plus_Jakarta_Sans_variable.ttf", wdth: null,       wght: [200,  800] },
    { name: "Figtree",           localFile: "Figtree_variable.ttf",           wdth: null,       wght: [300,  900] },
    { name: "Recursive",         localFile: "Recursive_variable.ttf",         wdth: null,       wght: [300, 1000] },
  ],
};

// ╔══════════════════════════════════════════════════════════════╗
// ║  Inject @font-face rules pointing to local TTF files         ║
// ╚══════════════════════════════════════════════════════════════╝
const FONT_DIR = 'file:///home/milo/fonts/';

(function injectFontFaces() {
  const css = CONFIG.fonts.map(f => {
    return `@font-face {
  font-family: "${f.name}";
  src: url("${FONT_DIR}${f.localFile}");
  font-weight: ${f.wght[0]} ${f.wght[1]};
  ${f.wdth ? `font-stretch: ${f.wdth[0]}% ${f.wdth[1]}%;` : ''}
  font-display: block;
}`;
  }).join('\n');

  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
})();

// ╔══════════════════════════════════════════════════════════════╗
// ║  State                                                       ║
// ╚══════════════════════════════════════════════════════════════╝
let fontIndex    = 0;
let currentFont  = null;
let animTime     = Math.random() * 100;
let inverted     = false;
let revealTimers = [];
let busy         = false;
let wordCache    = {};   // fontIndex → { chars, singleChar, singleDigit }
let singleMode   = false;
let numberMode   = false;

// App navigation
let currentApp      = 0;
const NUM_APPS      = 2;
const appEls        = ['app-typotrix','app-clock'].map(id => document.getElementById(id));

const letterEls  = [0,1,2,3].map(i => document.getElementById(`l${i}`));
const clockEls   = [0,1,2,3].map(i => document.getElementById(`c${i}`));
const labelEl    = document.getElementById('label');
const clockLabel = document.getElementById('clock-label');
const measureEl  = document.getElementById('measure');

// ╔══════════════════════════════════════════════════════════════╗
// ║  Helpers                                                     ║
// ╚══════════════════════════════════════════════════════════════╝
const sine01   = (t, period, phase = 0) => (Math.sin((t / period) * Math.PI * 2 + phase) + 1) / 2;
const lerp     = (a, b, t) => a + (b - a) * t;
const pickWord = () => CONFIG.words[Math.floor(Math.random() * CONFIG.words.length)];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  Font loading                                                ║
// ╚══════════════════════════════════════════════════════════════╝
async function ensureFont(font) {
  return true;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  Font sizing                                                 ║
// ╚══════════════════════════════════════════════════════════════╝
function measureChar(ch, fontName, px, fvs) {
  measureEl.style.fontFamily            = `"${fontName}", monospace`;
  measureEl.style.fontSize              = `${px}px`;
  measureEl.style.fontVariationSettings = fvs;
  measureEl.textContent = ch;
  const r = measureEl.getBoundingClientRect();
  return { w: r.width, h: r.height };
}

function fitFontSize(chars, font, cols, rows) {
  const cellW = window.innerWidth  / cols;
  const cellH = (window.innerHeight - CONFIG.grid.labelHeight) / rows;
  const maxW  = cellW * CONFIG.fontScale;
  const maxH  = cellH * CONFIG.fontScale;

  const fvs = [
    font.wdth ? `'wdth' ${font.wdth[1]}` : null,
    `'wght' ${font.wght[1]}`,
  ].filter(Boolean).join(', ');

  let lo = 10, hi = 1800, best = 40;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const fits = chars.every(ch => {
      const m = measureChar(ch, font.name, mid, fvs);
      return m.w <= maxW && m.h <= maxH;
    });
    if (fits) { best = mid; lo = mid + 1; }
    else       { hi  = mid - 1; }
  }
  return best;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  Typotrix scene                                              ║
// ╚══════════════════════════════════════════════════════════════╝
async function setScene(direction = 1) {
  if (busy) return;
  busy = true;

  revealTimers.forEach(clearTimeout);
  revealTimers = [];

  letterEls.forEach(el => { el.classList.remove('visible'); el.textContent = ''; });
  labelEl.textContent = 'loading…';

  let font, ok;
  for (let attempt = 0; attempt < CONFIG.fonts.length; attempt++) {
    const i = ((fontIndex % CONFIG.fonts.length) + CONFIG.fonts.length) % CONFIG.fonts.length;
    font = CONFIG.fonts[i];
    ok   = await ensureFont(font);
    if (ok) break;
    fontIndex += direction;
  }

  if (!ok) { labelEl.textContent = 'no fonts loaded — run setup_fonts.sh'; busy = false; return; }

  currentFont = font;
  numberMode  = (fontIndex > 0 && fontIndex % 7 === 0);
  singleMode  = !numberMode && (fontIndex > 0 && fontIndex % 5 === 0);

  if (!wordCache[fontIndex]) {
    const word  = pickWord();
    const upper = Math.random() < 0.5;
    const chars = word.split('').map(c => upper ? c.toUpperCase() : c.toLowerCase());
    wordCache[fontIndex] = {
      chars,
      singleChar:  chars[Math.floor(Math.random() * chars.length)],
      singleDigit: String(Math.floor(Math.random() * 10)),
    };
  }
  const chars = wordCache[fontIndex].chars;

  const grid = document.getElementById('grid');
  grid.classList.toggle('single-mode', singleMode || numberMode);

  measureEl.style.fontFamily = `"${font.name}", monospace`;
  await Promise.race([
    document.fonts.ready,
    new Promise(r => setTimeout(r, 2000)),
  ]);

  if (singleMode || numberMode) {
    const ch   = numberMode ? wordCache[fontIndex].singleDigit : wordCache[fontIndex].singleChar;
    const maxW = window.innerWidth  * CONFIG.fontScale;
    const maxH = (window.innerHeight - CONFIG.grid.labelHeight) * CONFIG.fontScale;
    const fvs  = font.wdth ? `'wdth' ${font.wdth[1]}, 'wght' ${font.wght[1]}` : `'wght' ${font.wght[1]}`;

    let lo = 10, hi = 1800, best = 40;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const m   = measureChar(ch, font.name, mid, fvs);
      if (m.w <= maxW && m.h <= maxH) { best = mid; lo = mid + 1; }
      else                             { hi  = mid - 1; }
    }

    letterEls[0].textContent = ch;
    letterEls[0].style.fontFamily = `"${font.name}", monospace`;
    letterEls[0].style.fontSize   = `${best}px`;
    letterEls.slice(1).forEach(el => { el.textContent = ''; });
    revealTimers.push(setTimeout(() => letterEls[0].classList.add('visible'), 80));

  } else {
    const px = fitFontSize(chars, font, CONFIG.grid.cols, CONFIG.grid.rows);
    chars.forEach((ch, i) => {
      letterEls[i].textContent = ch;
      letterEls[i].style.fontFamily = `"${font.name}", monospace`;
      letterEls[i].style.fontSize   = `${px}px`;
    });
    shuffle([0,1,2,3]).forEach((idx, i) => {
      revealTimers.push(
        setTimeout(() => letterEls[idx].classList.add('visible'),
                   i * CONFIG.anim.revealDelay * 1000)
      );
    });
  }

  const axisStr = font.wdth
    ? `wdth ${font.wdth[0]}–${font.wdth[1]}  ·  wght ${font.wght[0]}–${font.wght[1]}`
    : `wght ${font.wght[0]}–${font.wght[1]}`;
  labelEl.textContent = `${font.name}  ·  ${axisStr}`;

  animTime = Math.random() * 1000;
  busy = false;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  Clock                                                       ║
// ╚══════════════════════════════════════════════════════════════╝
function updateClock() {
  if (!currentFont) return;

  const now  = new Date();
  const h    = String(now.getHours()).padStart(2, '0');
  const m    = String(now.getMinutes()).padStart(2, '0');
  const s    = String(now.getSeconds()).padStart(2, '0');
  const digits = [h[0], h[1], m[0], m[1]];

  // Size digits to fill their cells (2×2 grid, same as Typotrix)
  const px = fitFontSize(digits, currentFont, 2, 2);

  digits.forEach((d, i) => {
    clockEls[i].textContent = d;
    clockEls[i].style.fontFamily = `"${currentFont.name}", monospace`;
    clockEls[i].style.fontSize   = `${px}px`;
    clockEls[i].classList.add('visible');
  });

  clockLabel.textContent = `${h}:${m}:${s}`;
}

setInterval(updateClock, 1000);


// ╔══════════════════════════════════════════════════════════════╗
// ║  App switching                                               ║
// ╚══════════════════════════════════════════════════════════════╝
function switchApp(dir) {
  const next    = (currentApp + dir + NUM_APPS) % NUM_APPS;
  const current = appEls[currentApp];
  const nextEl  = appEls[next];
  const W       = window.innerWidth;

  // Snap next panel to the incoming side with no transition
  nextEl.style.transition = 'none';
  nextEl.style.transform  = `translateX(${dir * W}px)`;
  nextEl.getBoundingClientRect(); // force reflow

  // Re-enable transitions on both and slide together
  nextEl.style.transition  = '';
  current.style.transition = '';
  nextEl.style.transform   = 'translateX(0)';
  current.style.transform  = `translateX(${-dir * W}px)`;

  currentApp = next;
  if (currentApp === 1) updateClock();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  Animation loop                                              ║
// ╚══════════════════════════════════════════════════════════════╝
let lastTs = null;

function frame(ts) {
  if (lastTs === null) lastTs = ts;
  const dt  = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs    = ts;
  animTime += dt;

  if (currentFont) {
    const font = currentFont;
    const { wghtPeriod, wghtPhase, letterStagger } = CONFIG.anim;

    // All elements — wght only
    [...letterEls, ...clockEls].forEach((el, i) => {
      const offset = i * letterStagger;
      const wghtT  = sine01(animTime, wghtPeriod, wghtPhase + offset);
      const wght   = lerp(font.wght[0], font.wght[1], wghtT);
      el.style.fontVariationSettings = `'wght' ${wght.toFixed(0)}`;
    });
  }

  requestAnimationFrame(frame);
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  Input                                                       ║
// ╚══════════════════════════════════════════════════════════════╝
function next() { fontIndex++;                             setScene(1);  }
function prev() { fontIndex = Math.max(0, fontIndex - 1); setScene(-1); }

function toggleInvert() {
  inverted = !inverted;
  const c = CONFIG.colors;
  document.documentElement.style.setProperty('--bg',       inverted ? c.bgInv    : c.bg);
  document.documentElement.style.setProperty('--fg',       inverted ? c.fgInv    : c.fg);
  document.documentElement.style.setProperty('--label-fg', inverted ? c.labelInv : c.labelFg);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'd') next();
  if (e.key === 'ArrowLeft'  || e.key === 'a') prev();
  if (e.key === 'i')                           toggleInvert();
  if (e.key === 'Escape')                      window.close();
});

// Touch — press is a press, swipe is a swipe, no in-between
// touchmove sets isSwiping the moment the finger travels; touchend reads it.
let touch0    = null;
let touchT    = null;
let isSwiping = false;
let swipeDx   = 0;
let swipeDy   = 0;
const { longPressMs } = CONFIG.touch;

document.addEventListener('touchstart', e => {
  touch0    = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  touchT    = Date.now();
  isSwiping = false;
  swipeDx   = 0;
  swipeDy   = 0;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!touch0) return;
  swipeDx   = e.touches[0].clientX - touch0.x;
  swipeDy   = e.touches[0].clientY - touch0.y;
  isSwiping = true;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!touch0) return;
  const held = Date.now() - touchT;

  if (isSwiping) {
    // Swipe — direction decided by dominant axis
    if (Math.abs(swipeDx) >= Math.abs(swipeDy)) {
      // Horizontal swipe — switch app
      switchApp(swipeDx < 0 ? 1 : -1);
    }
    // Vertical swipe — reserved for future use
  } else if (held >= longPressMs) {
    // Long press — invert
    toggleInvert();
  } else {
    // Clean press — font navigation (Typotrix only)
    if (currentApp === 0) {
      touch0.x < window.innerWidth / 2 ? prev() : next();
    }
  }

  touch0 = null;
});

// ╔══════════════════════════════════════════════════════════════╗
// ║  Boot                                                        ║
// ╚══════════════════════════════════════════════════════════════╝
// Park all panels off-screen except the first
appEls.forEach((el, i) => {
  el.style.transition = 'none';
  el.style.transform  = i === 0 ? 'translateX(0)' : `translateX(${window.innerWidth}px)`;
});

requestAnimationFrame(frame);
setScene(1);
</script>
</body>
</html>
